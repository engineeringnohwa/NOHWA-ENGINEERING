<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOHWA ENGINEERING | Pakar Perlindungan Kebakaran Kedah</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            color: #333;
            line-height: 1.6;
        }
        header {
            background-color: #1a1a1a;
            color: white;
            padding: 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 4px solid #ce1a1a;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ce1a1a;
        }
        .logo span {
            color: white;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }
        nav a:hover {
            color: #ce1a1a;
        }
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://unsplash.com') no-repeat center center/cover;
            height: 80vh;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            margin-top: 70px;
        }
        .hero h1 {
            font-size: 45px;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 20px;
            margin-bottom: 25px;
            max-width: 600px;
        }
        .btn {
            background-color: #ce1a1a;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #a31414;
        }
        .section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section h2 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            color: #1a1a1a;
        }
        .section h2::after {
            content: '';
            width: 50px;
            height: 4px;
            background-color: #ce1a1a;
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 100px));
            gap: 30px;
            justify-content: center;
        }
        .service-card {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            border-top: 5px solid #ce1a1a;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .service-card h3 {
            margin-bottom: 15px;
            color: #ce1a1a;
        }
        .about-text {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            font-size: 18px;
        }
        .contact-info {
            background: #1a1a1a;
            color: white;
            padding: 50px 20px;
            text-align: center;
        }
        .contact-info p {
            margin-bottom: 15px;
        }
        footer {
            background-color: #111;
            color: #777;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">NOHWA <span>ENGINEERING</span></div>
            <nav>
                <a href="#home">Utama</a>
                <a href="#about">Mengenai Kami</a>
                <a href="#services">Servis</a>
                <a href="#contact">Hubungi</a>
            </nav>
        </div>
    </header>
